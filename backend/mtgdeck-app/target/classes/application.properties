spring.application.name=mtgdeck-app

# Configuración del servidor
server.port=8080

# Configuración de base de datos en memoria (H2)
spring.datasource.url=jdbc:h2:mem:mtgdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite ver la consola de H2 en http://localhost:8080/h2-console
spring.h2.console.enabled=true

# Hibernate ddl-auto (crea las tablas automáticamente en base a tus entidades)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
