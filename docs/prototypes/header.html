<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDH Builder - Header</title>
    <!-- Google Fonts: Inter para UI y Cinzel para toque de fantasía/MTG -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome para iconos rápidos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Definición de la paleta de colores del usuario en Tono Claro */
        :root {
            --rough-charcoal: #2C2C2C;
            --wildwood-green: #1E5612;
            --savage-cinder: #B9F22B;
            --terracotta-earth: #D29C6A;
            --bark-brown: #8B5E3C;
            --enlace-activo: #F59D1E;
            --resaltado-textual: #597E3A;

            /* Colores de soporte para Tono Claro (Blanco Roto / Pergamino) */
            --bg-primary: #F4F1EA;
            /* Blanco roto / Hueso cálido para el Header */
            --bg-page: #EAE6DF;
            /* Pergamino suave para el fondo de la página */
            --text-primary: #2C2C2C;
            --text-secondary: #5A5A5A;
            --text-muted: #888888;
            --bg-hover: rgba(44, 44, 44, 0.05);
            /* Hover sutil oscuro */
            --border-light: rgba(139, 94, 60, 0.15);
            /* Bark brown sutil */
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            /* Fondo claro de previsualización */
            color: var(--text-primary);
        }

        /* --- ESTILOS DEL HEADER (Tono Claro) --- */
        .app-header {
            background-color: var(--bg-primary);
            border-bottom: 2px solid var(--bark-brown);
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        /* Bloque Izquierdo: Logo */
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            cursor: pointer;
        }

        /* Imagen del Logo (Usando mix-blend-mode para fondo transparente) */
        .logo-img {
            height: 44px;
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
            transition: var(--transition-smooth);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--rough-charcoal);
            letter-spacing: 1px;
            line-height: 1.2;
            transition: var(--transition-smooth);
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: var(--bark-brown);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-container:hover .logo-img {
            transform: scale(1.08) rotate(5deg);
        }

        .logo-container:hover .logo-title {
            color: var(--enlace-activo);
        }

        /* Bloque Central: Navegación */
        .header-center {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0.5rem;
            height: 100%;
            align-items: center;
        }

        .nav-item {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        /* Hover estándar */
        .nav-link:hover {
            color: var(--wildwood-green);
            background-color: var(--bg-hover);
        }

        /* Indicador sutil de hover */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 3px;
            background-color: var(--wildwood-green);
            border-radius: 3px 3px 0 0;
            transition: var(--transition-smooth);
        }

        .nav-link:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        /* Clase activa con color Enlace Activo (#F59D1E) */
        .nav-link.active {
            color: var(--enlace-activo);
        }

        .nav-link.active::after {
            transform: translateX(-50%) scaleX(1);
            background-color: var(--enlace-activo);
        }

        /* Iconos pequeños para dar estilo MTG a los links */
        .nav-link i {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Bloque Derecho: Campanita y Perfil */
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Campanita de Notificaciones */
        .notifications-wrapper {
            position: relative;
        }

        .notifications-btn {
            background: none;
            border: none;
            color: var(--rough-charcoal);
            font-size: 1.35rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            outline: none;
        }

        .notifications-btn:hover {
            background-color: var(--bg-hover);
            color: var(--enlace-activo);
        }

        /* Animación jiggle al pasar el ratón */
        .notifications-btn:hover i {
            animation: bellJiggle 0.6s ease-in-out;
        }

        /* Badge de Notificación en Savage Cinder (#B9F22B) con borde blanco */
        .notification-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: var(--savage-cinder);
            color: var(--rough-charcoal);
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-primary);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Perfil de Usuario */
        .profile-wrapper {
            position: relative;
            cursor: pointer;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            transition: var(--transition-smooth);
        }

        .profile-btn:hover {
            background-color: var(--bg-hover);
        }

        .avatar-container {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--wildwood-green);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            background-color: #EAEAEA;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-chevron {
            color: var(--text-muted);
            font-size: 0.8rem;
            transition: var(--transition-smooth);
        }

        /* Hover efectos de perfil */
        .profile-wrapper:hover .avatar-container {
            border-color: var(--enlace-activo);
            box-shadow: 0 0 8px rgba(245, 157, 30, 0.3);
            transform: scale(1.05);
        }

        .profile-wrapper:hover .profile-chevron {
            color: var(--enlace-activo);
            transform: translateY(2px);
        }

        /* --- KEYFRAMES DE ANIMACIONES --- */
        @keyframes bellJiggle {

            0%,
            100% {
                transform: rotate(0);
            }

            15% {
                transform: rotate(15deg);
            }

            30% {
                transform: rotate(-12deg);
            }

            45% {
                transform: rotate(10deg);
            }

            60% {
                transform: rotate(-8deg);
            }

            75% {
                transform: rotate(4deg);
            }

            90% {
                transform: rotate(-2deg);
            }
        }

        /* --- ESTILOS DE RESPONSIVE (MÓVIL) --- */
        @media (max-width: 768px) {
            .app-header {
                padding: 0 1rem;
            }

            .logo-subtitle {
                display: none;
            }

            .nav-link span {
                display: none;
            }

            .nav-link {
                padding: 0.6rem;
            }

            .logo-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Contenedor del Header -->
    <header class="app-header">

        <!-- Izquierda: Logo y Nombre -->
        <div class="header-left">
            <a href="index.html" class="logo-container">
                <img src="logo.png" alt="EDH Builder Logo" class="logo-img">
                <div class="logo-text">
                    <span class="logo-title">EDH Builder</span>
                    <span class="logo-subtitle">Commander</span>
                </div>
            </a>
        </div>

        <!-- Centro: Pestañas de Navegación -->
        <nav class="header-center">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="deck.html" class="nav-link active">
                        <i class="fa-solid fa-layer-group"></i>
                        <span>Mazos</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="community.html" class="nav-link">
                        <i class="fa-solid fa-users"></i>
                        <span>Comunidad</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="family.html" class="nav-link">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Familia</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Derecha: Campanita y Perfil -->
        <div class="header-right">

            <!-- Campanita de Notificaciones (a la izquierda del perfil) -->
            <div class="notifications-wrapper">
                <button class="notifications-btn" title="Notificaciones" aria-label="Notificaciones">
                    <i class="fa-regular fa-bell"></i>
                    <!-- Badge con contador usando Savage Cinder -->
                    <span class="notification-badge">3</span>
                </button>
            </div>

            <!-- Perfil de Usuario -->
            <div class="profile-wrapper">
                <button class="profile-btn" title="Mi Cuenta" aria-label="Menú de perfil">
                    <div class="avatar-container">
                        <!-- Imagen de perfil placeholder (Estilo MTG/Planeswalker) -->
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Jace" alt="Avatar" class="avatar-img">
                    </div>
                    <i class="fa-solid fa-chevron-down profile-chevron"></i>
                </button>
            </div>

        </div>

    </header>

</body>

</html>
