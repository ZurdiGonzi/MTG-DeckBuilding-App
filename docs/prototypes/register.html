<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDH Builder - Registro</title>
    <!-- Google Fonts: Inter para UI y Cinzel para estética MTG -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Paleta de colores del usuario en Tono Claro */
        :root {
            --rough-charcoal: #2C2C2C;
            --wildwood-green: #1E5612;
            --savage-cinder: #B9F22B;
            --terracotta-earth: #D29C6A;
            --bark-brown: #8B5E3C;
            --enlace-activo: #F59D1E;
            --resaltado-textual: #597E3A;
            
            /* Colores de soporte */
            --bg-primary: #F4F1EA; /* Blanco roto / Hueso */
            --bg-page: #EAE6DF;    /* Pergamino */
            --text-primary: #2C2C2C;
            --text-secondary: #5A5A5A;
            --text-muted: #888888;
            --border-light: rgba(139, 94, 60, 0.2);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* --- CONTENEDOR DE REGISTRO (Fiel al estilo login) --- */
        .register-card {
            background-color: var(--bg-primary);
            border: 2px solid var(--bark-brown);
            border-radius: 16px;
            width: 100%;
            max-width: 950px; /* Un poco más ancho para albergar el formulario de doble columna */
            min-height: 580px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        /* Columna Izquierda: Imagen */
        .register-image-side {
            width: 40%;
            position: relative;
            background-color: var(--rough-charcoal);
            border-right: 1px solid var(--border-light);
        }

        .register-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .register-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(89, 126, 58, 0.25), rgba(44, 44, 44, 0.6));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
            color: #FFFFFF;
        }

        .image-quote {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #FFFFFF;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }

        .image-quote-author {
            font-size: 0.75rem;
            color: var(--savage-cinder);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        /* Columna Derecha: Formulario */
        .register-form-side {
            width: 60%;
            padding: 2.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Cabecera */
        .form-header {
            margin-bottom: 1.5rem;
        }

        .form-title-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }

        .form-logo {
            height: 32px;
            width: auto;
            mix-blend-mode: multiply;
        }

        .form-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--rough-charcoal);
        }

        .form-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Grid de campos (Doble columna para optimizar espacio) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .input-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--rough-charcoal);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .input-field {
            width: 100%;
            height: 42px;
            background-color: rgba(44, 44, 44, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 0 1rem 0 2.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: var(--transition-smooth);
            outline: none;
        }

        .input-field:focus {
            background-color: #FFFFFF;
            border-color: var(--wildwood-green);
            box-shadow: 0 0 8px rgba(30, 86, 18, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--wildwood-green);
        }

        /* Checkbox de Términos */
        .terms-container {
            margin-bottom: 1.25rem;
        }

        .terms-label {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.4;
            user-select: none;
        }

        .terms-label input {
            accent-color: var(--wildwood-green);
            cursor: pointer;
            width: 15px;
            height: 15px;
            margin-top: 2px;
        }

        .terms-link {
            color: var(--enlace-activo);
            text-decoration: none;
            font-weight: 600;
        }

        .terms-link:hover {
            text-decoration: underline;
        }

        /* Botón de envío */
        .submit-btn {
            width: 100%;
            height: 46px;
            background-color: var(--wildwood-green);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 10px rgba(30, 86, 18, 0.25);
        }

        .submit-btn:hover {
            background-color: var(--enlace-activo);
            box-shadow: 0 4px 12px rgba(245, 157, 30, 0.35);
            transform: translateY(-1px);
        }

        /* OAuth Sección */
        .social-separator {
            display: flex;
            align-items: center;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .social-separator::before,
        .social-separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-light);
        }

        .social-separator span {
            padding: 0 0.75rem;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .social-btn {
            flex: 1;
            height: 40px;
            border: 1px solid var(--border-light);
            background-color: #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .social-btn:hover {
            background-color: rgba(44, 44, 44, 0.03);
            border-color: var(--text-secondary);
            color: var(--rough-charcoal);
        }

        .social-btn.google i {
            color: #DB4437;
        }

        .social-btn.patreon i {
            color: #FF424D;
        }

        /* Enlace de login */
        .login-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .login-link {
            color: var(--enlace-activo);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition-smooth);
        }

        .login-link:hover {
            text-decoration: underline;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .register-card {
                flex-direction: column;
                max-width: 480px;
                min-height: auto;
            }

            .register-image-side {
                width: 100%;
                height: 160px;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
            }

            .register-image-overlay {
                padding: 1.25rem;
            }

            .image-quote {
                font-size: 0.95rem;
            }

            .register-form-side {
                width: 100%;
                padding: 2rem 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }


        }
    </style>
</head>
<body>

    <!-- Tarjeta del Formulario de Registro -->
    <div class="register-card">
        
        <!-- Columna Izquierda: Ilustración de Fantasía (Nueva imagen) -->
        <div class="register-image-side">
            <img src="register_art.png" alt="Fragua Mágica de Cartas" class="register-image">
            <div class="register-image-overlay">
                <blockquote class="image-quote">
                    "Toda gran leyenda comienza con la forja del primer mazo."
                </blockquote>
                <cite class="image-quote-author">Archivista de la Forja</cite>
            </div>
        </div>

        <!-- Columna Derecha: Formulario -->
        <div class="register-form-side">
            
            <!-- Cabecera -->
            <div class="form-header">
                <div class="form-title-group">
                    <img src="logo.png" alt="EDH Builder" class="form-logo">
                    <h1 class="form-title">Registrarse</h1>
                </div>
                <p class="form-subtitle">Forja tu cuenta en EDH Builder y domina el formato Commander.</p>
            </div>

            <!-- Formulario de Registro -->
            <form id="registerForm" onsubmit="event.preventDefault();">
                
                <div class="form-grid">
                    
                    <!-- Campo: Usuario (username) -->
                    <div class="input-group">
                        <label class="input-label" for="username">Usuario</label>
                        <div class="input-field-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input class="input-field" type="text" id="username" placeholder="ej. ChandraNalaar" required>
                        </div>
                    </div>

                    <!-- Campo: Email (email) -->
                    <div class="input-group">
                        <label class="input-label" for="email">Email</label>
                        <div class="input-field-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input class="input-field" type="email" id="email" placeholder="ej. chandra@magic.com" required>
                        </div>
                    </div>

                    <!-- Campo: Contraseña (password) -->
                    <div class="input-group">
                        <label class="input-label" for="password">Contraseña</label>
                        <div class="input-field-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input class="input-field" type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                        </div>
                    </div>

                    <!-- Campo: Confirmar Contraseña -->
                    <div class="input-group">
                        <label class="input-label" for="confirmPassword">Confirmar Contraseña</label>
                        <div class="input-field-wrapper">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                            <input class="input-field" type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                        </div>
                    </div>



                </div>

                <!-- Aceptar Términos -->
                <div class="terms-container">
                    <label class="terms-label">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>Acepto las <a href="terms.html" class="terms-link">Normas de la Forja</a> y la política de privacidad de EDH Builder.</span>
                    </label>
                </div>

                <!-- Botón de Envío -->
                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-hammer"></i>
                    Forjar Cuenta
                </button>

                <!-- Separador OAuth -->
                <div class="social-separator">
                    <span>O registrarse con</span>
                </div>

                <!-- Botones OAuth (Igual al Login) -->
                <div class="social-buttons">
                    <button type="button" class="social-btn google" onclick="alert('Registrándose con Google...');">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button type="button" class="social-btn patreon" onclick="alert('Registrándose con Patreon...');">
                        <i class="fa-brands fa-patreon"></i>
                        Patreon
                    </button>
                </div>

            </form>

            <!-- Pie: Enlace de Login -->
            <div class="login-footer">
                ¿Ya tienes una cuenta? <a href="login.html" class="login-link">Inicia sesión aquí</a>
            </div>

        </div>

    </div>

</body>
</html>
